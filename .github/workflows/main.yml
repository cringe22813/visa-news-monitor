name: Visa News Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: visa-news
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit last_news if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions@github.com"
          
          git add last_news.txt
          
          # Проверяем, есть ли изменения
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          
          git commit -m "Update last news [ci skip]"
          
          # Force pull + rebase + push с retry
          for attempt in {1..5}; do
            git pull --rebase origin main || true
            git push origin main && break
            echo "Push attempt $attempt failed, retrying in 5s..."
            sleep 5
          done || { echo "All push attempts failed"; exit 1; }
